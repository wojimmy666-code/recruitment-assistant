<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Recruitment Assistant</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="popupShell">
      <header class="popupHeader">
        <div>
          <h1>批量打招呼</h1>
          <p id="status">等待开始。</p>
        </div>
        <div class="headerActions">
          <button id="open-app" class="iconButton" type="button" title="打开本地工具" aria-label="打开本地工具">↗</button>
          <button id="open-debug" class="iconButton" type="button" title="打开调试工具" aria-label="打开调试工具">···</button>
        </div>
      </header>
      <section class="batchControls" aria-label="批量参数">
        <div class="batchInputs">
          <label>目标<input id="batch-target" type="number" min="1" max="20" value="3" /></label>
          <label>最小间隔<input id="batch-interval-min" type="number" min="30" value="45" /></label>
          <label>最大间隔<input id="batch-interval-max" type="number" min="30" value="90" /></label>
        </div>
        <button id="batch-start" type="button" class="primary">开始批量打招呼</button>
        <button id="batch-continue" type="button" class="primary" hidden>恢复批量</button>
        <button id="batch-pause" type="button" hidden>暂停批量</button>
      </section>
      <section id="result" class="resultPanel" hidden></section>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
